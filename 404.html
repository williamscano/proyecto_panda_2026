<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Pandita perdido ...</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #3d2415, #6b3f28);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 1rem;
    }
    .card {
      background: #fdf3ed;
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 3px #e07a5f, 0 0 0 6px #f4d0b5;
    }
    .panda { font-size: 5rem; display: block; margin-bottom: 0.2rem; }
    .num { font-size: 5.5rem; font-weight: 900; color: #c4452b; text-shadow: 2px 4px 8px rgba(180,60,30,0.3); line-height: 1; }
    h1 { font-size: 1.6rem; color: #4d2b1b; margin: 0.3rem 0 0.8rem; }
    p { color: #5f3d2b; font-size: 1rem; background: #f5e3d9; padding: 0.8rem 1.2rem; border-radius: 2rem; border-left: 5px solid #cf5a3a; margin-bottom: 1.5rem; }
    .btn { display: inline-block; background: #b64128; color: #fff; padding: 0.7rem 2.2rem; border-radius: 3rem; text-decoration: none; font-weight: 600; box-shadow: 0 5px 0 #782f1d; transition: 0.15s; }
    .btn:hover { background: #cf5033; transform: translateY(-2px); box-shadow: 0 7px 0 #782f1d; }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #782f1d; }
    .foot { margin-top: 1.5rem; font-size: 0.8rem; color: #8a6b58; border-top: 2px dashed #dbaa92; padding-top: 1rem; }
    .foot i { color: #c4452b; }
  </style>
</head>
<body>
  <div class="card">
    <span class="panda"><i class="fas fa-paw" style="color:#d45c3a;"></i></span>
    <div class="num">404</div>
    <h1>¡Ooopss página no encontrada!</h1>
    <p><i class="fas fa-leaf" style="color:#c4452b;"></i> Esta página se perdió en el bosque de bambú.</p>
    <a href="https://pandita2026.vercel.app/" class="btn"><i class="fas fa-home"></i> Volver al inicio</a>
    <div class="foot">
      <i class="fas fa-paw"></i> <i class="fas fa-paw"></i> <i class="fas fa-paw"></i>
      <br><small>#ProtegeAlPandaRojo</small>
    </div>
  </div>
</body>
</html>
