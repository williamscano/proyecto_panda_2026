<body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PWK34Q38" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>

    <!-- HEADER con VBAR semántico mejorado -->
    <div id="header-container"></div>
    <!-- Donaciones -->
    <section id="donaciones" class="container my-5" aria-labelledby="donaciones-titulo">
        <div class="donation-card">
            <div class="hero-panda text-white">
                <i class="fas fa-paw"></i><i class="fas fa-tree"></i><i class="fas fa-heart"></i>
                <h1 id="donaciones-titulo">Protege al Panda Rojo</h1>
                <p>Tu donación ayuda a conservar una especie única</p>
            </div>
            <div class="form-body">
                <form id="donacionPandaForm" netlify method="POST" novalidate>
                    <input type="hidden" name="_subject" value="Nueva donación Panda Rojo">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">

                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" required>
                        <label for="nombre"><i class="fas fa-user me-2"></i>Nombre</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="apellidos" name="apellidos" placeholder="Apellidos"
                            required>
                        <label for="apellidos"><i class="fas fa-user-friends me-2"></i>Apellidos</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="correo" name="email"
                            placeholder="correo@ejemplo.com" required>
                        <label for="correo"><i class="fas fa-envelope me-2"></i>Correo electrónico</label>
                    </div>

                    <fieldset class="mb-4">
                        <legend class="form-label fw-bold">Selecciona la cantidad de tu donación:</legend>
                        <div class="fixed-amounts d-flex flex-wrap gap-2">
                            <div><input type="radio" class="btn-check" name="donacion" id="donar10" value="10"
                                    autocomplete="off"><label class="btn btn-outline-danger" for="donar10">10 €</label>
                            </div>
                            <div><input type="radio" class="btn-check" name="donacion" id="donar20" value="20"
                                    autocomplete="off"><label class="btn btn-outline-danger" for="donar20">20 €</label>
                            </div>
                            <div><input type="radio" class="btn-check" name="donacion" id="donar50" value="50"
                                    autocomplete="off"><label class="btn btn-outline-danger" for="donar50">50 €</label>
                            </div>
                            <div><input type="radio" class="btn-check" name="donacion" id="donar100" value="100"
                                    autocomplete="off"><label class="btn btn-outline-danger" for="donar100">100
                                    €</label></div>
                            <div><input type="radio" class="btn-check" name="donacion" id="donar200" value="200"
                                    autocomplete="off"><label class="btn btn-outline-danger" for="donar200">200
                                    €</label></div>
                        </div>
                    </fieldset>

                    <div class="checkbox-container">
                        <input type="checkbox" id="custom-amount">
                        <label for="custom-amount">💰 Otra cantidad</label>
                        <input type="number" step="1" min="1" placeholder="0,00 €" class="cantidad-personalizada"
                            id="cantidadPersonalizada" aria-label="Cantidad personalizada en euros">
                    </div>
                    <div class="info-unica mt-1"><i class="fas fa-info-circle"></i> Selecciona una cantidad fija o marca
                        "Otra
                        cantidad" para tu importe.</div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="button" class="btn btn-outline-danger w-50" id="limpiarBtn"><i
                                class="fas fa-eraser"></i>
                            Limpiar</button>
                        <button type="submit" class="btn btn-danger w-50"><i class="fas fa-heart me-2"></i> Donar
                            ahora</button>
                    </div>
                </form>

                <div id="feedbackArea" class="mt-4 small fw-semibold text-center"></div>
                <div class="text-center mt-3 text-muted"><small>🌿 Asociación Panda Rojo · Donación segura · Gracias por
                        ayudar</small></div>
            </div>
        </div>
    </section>

      <!-- footer -->
  <div id="footer-container"></div>
</body>
