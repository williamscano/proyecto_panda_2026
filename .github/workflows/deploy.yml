name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Sync to InfinityFree Subfolder
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🧹 Clean Netlify specific files for InfinityFree
      run: |
        rm -f _redirects
        rm -f netlify.toml

    # El cambio está aquí abajo 👇
    - name: 🚀 Sync files via FTP to InfinityFree
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /htdocs/prueba/  # <--- Creará y subirá todo aquí en Infinityfree
